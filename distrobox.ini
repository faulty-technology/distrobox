[dev]
image=docker.io/library/ubuntu:24.04
pull=true
additional_packages="build-essential git curl wget unzip zip cmake ninja-build pkg-config python3 python3-pip python3-venv nodejs npm ripgrep fd-find htop tmux jq ca-certificates apt-transport-https gpg"
init_hooks=bash $DISTROBOX_HOOKS_DIR/dev.sh

[godot]
image=docker.io/library/ubuntu:24.04
pull=true
additional_packages="git curl wget unzip ca-certificates apt-transport-https gpg libx11-6 libxcursor1 libxinerama1 libgl1 libglu1-mesa libasound2t64 libpulse0 libudev1 libxi6 libxrandr2 libwayland-client0 vulkan-tools mesa-vulkan-drivers libvulkan1 python3"
init_hooks=bash $DISTROBOX_HOOKS_DIR/godot.sh
